<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="31" ry="31" fill="#1c1917"/>
  <!-- left page (verso): outline only, slightly receding -->
  <rect x="44" y="66" width="74" height="126" fill="none" stroke="#fafaf9" stroke-width="5" stroke-opacity="0.55"/>
  <!-- right page (recto): solid, full bleed-y, the "highlight" -->
  <rect x="118" y="56" width="92" height="144" fill="#fafaf9"/>
  <!-- spine -->
  <line x1="118" y1="56" x2="118" y2="200" stroke="#fafaf9" stroke-width="6"/>
</svg>
