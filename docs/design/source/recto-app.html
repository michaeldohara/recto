<!DOCTYPE html>
<html lang="en" data-edition="spread" data-mode="rendered" data-theme="auto">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>recto</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="recto-app.css" />
</head>
<body>
<div class="win" id="win">

  <!-- ── Title bar (drag region) ───────────────────────── -->
  <header class="titlebar" id="titlebar">
    <div class="tb-left">
      <span class="brand-mark" id="brandMark" aria-hidden="true"></span>
      <span class="brand-word">recto</span>
    </div>
    <div class="tb-right">
      <button class="btn-open" id="btnOpen">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 4.2c0-.66.54-1.2 1.2-1.2h3l1.3 1.6h5.1c.66 0 1.2.54 1.2 1.2v6c0 .66-.54 1.2-1.2 1.2H3.2c-.66 0-1.2-.54-1.2-1.2z"/></svg>
        Open
      </button>
      <button class="btn-menu" id="btnMenu" aria-label="Menu" aria-haspopup="true">
        <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="3.2" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="8" cy="12.8" r="1.4"/></svg>
      </button>

      <div class="menu" id="menu" hidden role="menu">
        <button class="mi" data-act="open" role="menuitem">
          <span class="mi-label">Open file…</span><span class="mi-kbd">Ctrl O</span>
        </button>
        <div class="mi-div"></div>
        <div class="mi-head">View</div>
        <button class="mi" data-mode="raw" role="menuitemradio">
          <span class="mi-check"></span><span class="mi-label">Raw</span><span class="mi-kbd">Ctrl 1</span>
        </button>
        <button class="mi" data-mode="rendered" role="menuitemradio">
          <span class="mi-check"></span><span class="mi-label">Rendered</span><span class="mi-kbd">Ctrl 2</span>
        </button>
        <button class="mi" data-mode="memo" role="menuitemradio">
          <span class="mi-check"></span><span class="mi-label">Memo</span><span class="mi-kbd">Ctrl 3</span>
        </button>
        <div class="mi-div"></div>
        <button class="mi" data-act="toc" role="menuitem">
          <span class="mi-check" id="tocCheck"></span><span class="mi-label">Show contents</span><span class="mi-kbd">Ctrl \</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Stage ─────────────────────────────────────────── -->
  <div class="stage">

    <!-- TOC drawer (slides from left) -->
    <aside class="toc" id="toc" aria-label="Table of contents">
      <div class="toc-head">Contents</div>
      <nav class="toc-list" id="tocList"></nav>
    </aside>

    <!-- Content -->
    <main class="content" id="content" tabindex="-1">
      <!-- rendered/raw/memo injected here -->
    </main>

    <!-- Empty state -->
    <div class="empty" id="empty" hidden>
      <div class="empty-inner">
        <span class="empty-mark" id="emptyMark" aria-hidden="true"></span>
        <h1 class="empty-title">Nothing open yet</h1>
        <p class="empty-sub">Drop a Markdown file here, or click <strong>Open</strong>.</p>
        <button class="btn-open btn-open-lg" id="btnOpenEmpty">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 4.2c0-.66.54-1.2 1.2-1.2h3l1.3 1.6h5.1c.66 0 1.2.54 1.2 1.2v6c0 .66-.54 1.2-1.2 1.2H3.2c-.66 0-1.2-.54-1.2-1.2z"/></svg>
          Open a file
        </button>
        <div class="empty-hint"><span class="kbd">.md</span><span class="kbd">.markdown</span><span class="kbd">.mdx</span></div>
      </div>
    </div>

    <!-- Drop overlay -->
    <div class="drop-veil" id="dropVeil" hidden><div class="drop-card">Drop to open</div></div>
  </div>

  <!-- ── Status bar ────────────────────────────────────── -->
  <footer class="statusbar" id="statusbar">
    <div class="st-left">
      <span class="st-file" id="stFile">welcome.md</span>
      <span class="st-sep">·</span>
      <span class="st-words" id="stWords">312 words</span>
      <span class="st-sep">·</span>
      <span class="st-read" id="stRead">2 min read</span>
    </div>
    <div class="st-right">
      <span class="st-mode" id="stMode">Rendered</span>
    </div>
  </footer>

</div>

<input type="file" id="fileInput" accept=".md,.markdown,.mdx,.txt" hidden />

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="recto-content.js"></script>
<script src="recto-viewer.js"></script>
</body>
</html>
