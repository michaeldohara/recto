<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recto</title>
    <link rel="stylesheet" href="./vendor/github-markdown.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="titlebar" data-tauri-drag-region>
      <span class="wordmark">recto</span>
      <button class="open-btn" id="open-btn" title="Open Markdown file (Ctrl+O)">Open</button>
    </header>

    <main class="document-area" id="doc">
      <div class="empty-state">
        <p class="empty-hint">Drop a Markdown file here<br />or click <strong>Open</strong></p>
      </div>
    </main>

    <footer class="status-bar">
      <span class="filename" id="filename"></span>
      <span class="meta" id="meta"></span>
    </footer>

    <!-- markdown-it loads first (UMD, exposes window.markdownit) -->
    <script src="./vendor/markdown-it.min.js"></script>
    <!-- main app logic, runs after markdown-it is loaded -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
